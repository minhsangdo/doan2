name: Deploy to Hugging Face Space

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          set -e

          git config --global user.email "actions@github.com"
          git config --global user.name "github-actions"

          # 1) Clone Space repo
          git clone "https://oauth2:${HF_TOKEN}@huggingface.co/spaces/minhsangdo/dnc-admission-chatbot" hf-space

          # 2) Sync code (exclude heavy/binary/raw files)
          rsync -av --delete \
            --exclude ".git" \
            --exclude "hf-space" \
            --exclude ".github" \
            --exclude "node_modules" \
            --exclude "__pycache__" \
            --exclude "*.pyc" \
            --exclude "*.log" \
            --exclude ".env" \
            --exclude ".venv" \
            --exclude "venv" \
            --exclude "data/raw/**" \
            --exclude "*.pdf" \
            --exclude "*.docx" \
            --exclude "*.pptx" \
            --exclude "*.zip" \
            --exclude "*.rar" \
            ./ hf-space/ || test $? -eq 24

          # 3) Commit & push
          cd hf-space
          git add .
          git commit -m "Auto deploy from GitHub Actions" || echo "No changes to commit"
          git push
