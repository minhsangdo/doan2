# Chỉ đồng bộ file cần chạy Space (tránh binary / repo nặng bị HF từ chối)
name: Deploy to Hugging Face Space

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Push whitelist to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          set -e
          git config --global user.email "actions@github.com"
          git config --global user.name "github-actions"

          git clone "https://oauth2:${HF_TOKEN}@huggingface.co/spaces/minhsangdo/dnc-admission-chatbot" hf-space

          # Giữ .git, xóa hết nội dung cũ (whitelist thay thế toàn bộ)
          find hf-space -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +

          mkdir -p hf-space/data/processed
          cp -r backend hf-space/
          cp -r frontend hf-space/
          rm -rf hf-space/frontend/node_modules
          # HF từ chối push git nếu có file nhị phân (png/jpg/pdf...) — giữ SVG/text
          find hf-space/frontend/public -type f \( \
            -iname '*.png' -o -iname '*.jpg' -o -iname '*.jpeg' -o \
            -iname '*.webp' -o -iname '*.gif' -o -iname '*.ico' -o -iname '*.pdf' \
          \) -delete 2>/dev/null || true
          cp -r data/processed/. hf-space/data/processed/
          cp -r scripts hf-space/
          cp Dockerfile .dockerignore hf-space/
          cp deploy/hf-README.md hf-space/README.md

          cd hf-space
          git add -A
          git commit -m "Deploy: whitelist (backend, frontend, data/processed, Dockerfile)" || echo "No changes to commit"
          git push
